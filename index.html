    async function validateComment(text) {
      const now = Date.now();

      if (text.length > 300) {
        return { valid: false, reason: "コメントは300文字以内です。" };
      }

      if (/https?:\/\//i.test(text) || /www\./i.test(text)) {
        return { valid: false, reason: "URLは投稿できません。" };
      }

      for (const word of NG_WORDS) {
        if (text.includes(word)) {
          return { valid: false, reason: "不適切な言葉が含まれています。" };
        }
      }

      if (state.userRegistrationTime && (now - state.userRegistrationTime) < 5 * 60 * 1000) {
        return { valid: false, reason: "新規登録後5分間はコメント投稿できません。" };
      }

      // 【修正2】localStorage から最後のコメント時刻を読み込み
      const lastTime = getLastCommentTimeFromStorage();
      if (lastTime && (now - lastTime) < 10 * 1000) {
        return { valid: false, reason: "コメントは10秒に1回までです。" };
      }

      // 【修正2】localStorage からミュート終了時刻を読み込み
      const muteEnd = getCommentMuteEndFromStorage();
      if (muteEnd && now < muteEnd) {
        const remaining = Math.ceil((muteEnd - now) / 1000);
        return { valid: false, reason: `連続投稿による一時ミュート中です。${remaining}秒待ってください。` };
      }

      const lastContent = state.lastCommentContent[state.user.uid];
      if (lastContent === text) {
        return { valid: false, reason: "同じ内容の連続投稿はできません。" };
      }

      return { valid: true };
    }

    });

    updateDateDisplay();
