<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>港区白金の丘中学校 第7学年 共有サイト</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f5f7;
      --surface: rgba(255, 255, 255, 0.92);
      --surface-strong: #ffffff;
      --surface-soft: #fafafc;
      --border: rgba(15, 23, 42, 0.08);
      --text: #111827;
      --muted: #6b7280;
      --muted-soft: #94a3b8;
      --accent: #0071e3;
      --accent-soft: rgba(0, 113, 227, 0.1);
      --success: #0f9f6e;
      --warning: #d97706;
      --danger: #d92d20;
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      --shadow-soft: 0 10px 24px rgba(15, 23, 42, 0.06);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --radius-sm: 14px;
      --max-width: 1220px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "SF Pro Display", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(0, 113, 227, 0.08), transparent 32%),
        radial-gradient(circle at top right, rgba(15, 169, 107, 0.08), transparent 28%),
        var(--bg);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }

    button, input, select, textarea {
      font: inherit;
    }

    img {
      max-width: 100%;
      display: block;
    }

    button {
      border: none;
      cursor: pointer;
    }

    .shell {
      width: min(var(--max-width), calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 calc(148px + env(safe-area-inset-bottom));
    }

    .site-header {
      display: grid;
      grid-template-columns: 1.7fr 1fr;
      gap: 18px;
      align-items: stretch;
      margin-bottom: 18px;
    }

    .card, .frosted, .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
    }

    .hero-card {
      padding: 32px;
      overflow: hidden;
      position: relative;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      inset: auto -100px -120px auto;
      width: 280px;
      height: 280px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(0, 113, 227, 0.16), transparent 62%);
      pointer-events: none;
    }

    h1, h2, h3, h4, p {
      margin: 0;
    }

    .hero-title {
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 1.08;
      letter-spacing: -0.04em;
      margin-bottom: 14px;
      max-width: 12ch;
    }

    .hero-lead {
      max-width: 60ch;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
    }

    .identity-card {
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 20px;
    }

    .identity-top {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .avatar-badge {
      width: 62px;
      height: 62px;
      border-radius: 18px;
      background: linear-gradient(135deg, #0a84ff, #40c8ff);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 1.5rem;
      font-weight: 700;
      box-shadow: 0 18px 40px rgba(10, 132, 255, 0.3);
      flex-shrink: 0;
    }

    .identity-label {
      font-size: 0.84rem;
      color: var(--muted-soft);
      margin-bottom: 6px;
    }

    .identity-name {
      font-size: 1.55rem;
      letter-spacing: -0.03em;
      margin-bottom: 4px;
    }

    .identity-role {
      color: var(--muted);
      font-size: 0.95rem;
      min-height: 1.2em;
    }

    .identity-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .identity-actions > * {
      flex: 1 1 180px;
    }

    .button, .ghost-button, .tonal-button, .danger-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 48px;
      padding: 0 16px;
      border-radius: 999px;
      font-weight: 700;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .button {
      background: linear-gradient(135deg, #0071e3, #2e90fa);
      color: #fff;
      box-shadow: 0 16px 32px rgba(0, 113, 227, 0.22);
    }

    .ghost-button {
      background: rgba(255, 255, 255, 0.88);
      color: #1f2937;
      border: 1px solid rgba(148, 163, 184, 0.18);
    }

    .danger-button {
      background: rgba(217, 45, 32, 0.12);
      color: var(--danger);
    }

    .toolbar {
      display: grid;
      gap: 16px;
      padding: 22px;
      margin-bottom: 18px;
    }

    .toolbar-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
    }

    .date-nav {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .range-label {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      min-width: 220px;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip {
      min-height: 46px;
      padding: 0 15px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.05);
      color: #334155;
      font-weight: 700;
    }

    .chip.active {
      background: rgba(0, 113, 227, 0.12);
      color: var(--accent);
    }

    .main-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.6fr) minmax(280px, 0.9fr);
      gap: 18px;
      align-items: start;
    }

    .primary-column, .secondary-column {
      display: grid;
      gap: 18px;
    }

    .panel {
      padding: 24px;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .panel-title {
      font-size: 1.2rem;
      letter-spacing: -0.03em;
    }

    .panel-subtitle {
      color: var(--muted);
      font-size: 0.92rem;
      margin-top: 4px;
    }

    .empty-state {
      padding: 28px 22px;
      border-radius: 20px;
      background: rgba(248, 250, 252, 0.9);
      border: 1px dashed rgba(148, 163, 184, 0.22);
      color: var(--muted);
      line-height: 1.8;
    }

    /* モバイルメニュー */
    .mobile-menu-button {
      display: none;
      background: none;
      border: none;
      font-size: 28px;
      cursor: pointer;
      padding: 8px;
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 500;
    }

    .mobile-menu-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 400;
    }

    .mobile-menu-overlay.active {
      display: block;
    }

    .mobile-menu-panel {
      display: none;
      position: fixed;
      top: 60px;
      right: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      z-index: 450;
      padding: 12px;
      gap: 8px;
      flex-direction: column;
      min-width: 180px;
    }

    .mobile-menu-panel.active {
      display: flex;
    }

    .mobile-menu-item {
      padding: 12px 16px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      background: rgba(0, 113, 227, 0.1);
      color: var(--accent);
      transition: background 0.18s ease;
    }

    .mobile-menu-item:hover {
      background: rgba(0, 113, 227, 0.2);
    }

    @media (max-width: 768px) {
      .site-header {
        grid-template-columns: 1fr;
      }

      .shell {
        width: min(calc(100vw - 18px), var(--max-width));
        padding-top: 14px;
        padding-bottom: calc(132px + env(safe-area-inset-bottom));
      }

      .mobile-menu-button {
        display: block;
      }

      .chip-row {
        display: none;
      }

      .hero-card, .identity-card, .toolbar, .panel {
        border-radius: 24px;
        padding: 20px;
      }

      .main-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .post-card {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <button class="mobile-menu-button" id="mobileMenuButton" type="button">≡</button>
  <div class="mobile-menu-overlay" id="mobileMenuOverlay"></div>
  <div class="mobile-menu-panel" id="mobileMenuPanel">
    <button class="mobile-menu-item" data-filter="all">すべて</button>
    <button class="mobile-menu-item" data-filter="予定">予定</button>
    <button class="mobile-menu-item" data-filter="宿題">宿題</button>
    <button class="mobile-menu-item" data-filter="連絡事項">連絡事項</button>
  </div>

  <main class="shell">
    <section class="site-header">
      <article class="hero-card frosted">
        <h1 class="hero-title">予定・宿題・連絡を、毎日見やすく。</h1>
        <p class="hero-lead">
          1組・2組向けに、授業予定、宿題、連絡事項をひとつにまとめた共有サイトです。
          コメントや画像付きのやり取りにも対応し、ブラウザだけでそのまま使えます。
        </p>
      </article>
    </section>

    <section class="toolbar frosted">
      <div class="toolbar-row">
        <div class="date-nav">
          <button class="ghost-button" type="button" data-nav="prev">前へ</button>
          <button class="ghost-button" type="button" data-nav="today">今日</button>
          <button class="ghost-button" type="button" data-nav="next">次へ</button>
          <div class="range-label" id="rangeLabel">読み込み中...</div>
        </div>
      </div>

      <div class="toolbar-row">
        <div class="chip-row" id="categoryFilterRow" aria-label="カテゴリ絞り込み">
          <button class="chip" type="button" data-category-filter="all">すべて</button>
          <button class="chip" type="button" data-category-filter="予定">予定</button>
          <button class="chip" type="button" data-category-filter="宿題">宿題</button>
          <button class="chip" type="button" data-category-filter="連絡事項">連絡事項</button>
        </div>
      </div>
    </section>

    <section class="main-grid">
      <div class="primary-column">
        <section class="panel frosted">
          <div class="panel-head">
            <div>
              <h2 class="panel-title" id="viewTitle">表示内容</h2>
              <p class="panel-subtitle" id="viewSubtitle">読み込み中...</p>
            </div>
          </div>
          <div id="viewContainer"></div>
        </section>
      </div>

      <aside class="secondary-column">
        <section class="panel frosted">
          <div class="panel-head">
            <div>
              <h2 class="panel-title">選択した日</h2>
              <p class="panel-subtitle" id="selectedDayLabel">読み込み中...</p>
            </div>
          </div>
          <div id="selectedDayPanel"></div>
        </section>
      </aside>
    </section>
  </main>

  <footer style="position: fixed; bottom: 0; right: 16px; padding: 12px; z-index: 100;">
    <button class="button" id="adminLoginButton" type="button" style="padding: 8px 14px; font-size: 0.9rem; min-height: 40px;">管理者</button>
    <button class="danger-button" id="adminLogoutButton" type="button" hidden style="padding: 8px 14px; font-size: 0.9rem; min-height: 40px;">ログアウト</button>
  </footer>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      deleteDoc,
      updateDoc,
      doc,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDz9GlkO5R2fBxMVlYHqgId8k-7C3uw_ak",
      authDomain: "school-site-475fc.firebaseapp.com",
      projectId: "school-site-475fc",
      storageBucket: "school-site-475fc.firebasestorage.app",
      messagingSenderId: "69139986081",
      appId: "1:69139986081:web:11c1b1b8277e503e9ee2e0",
      measurementId: "G-SCENXEX3ZH"
    };

    const STORAGE_KEYS = {
      userName: "shirokane7_user_name",
      posts: "shirokane7_posts"
    };

    const FIRESTORE_COLLECTIONS = {
      posts: "posts",
      comments: "comments"
    };

    const state = {
      userName: "",
      isAdmin: false,
      authUser: null,
      posts: [],
      remotePosts: [],
      remoteComments: [],
      isLoadingRemote: true,
      syncMode: "loading",
      categoryFilter: "all",
      currentDate: todayKey(),
      selectedDate: todayKey()
    };

    const refs = {
      viewContainer: document.getElementById("viewContainer"),
      selectedDayPanel: document.getElementById("selectedDayPanel"),
      currentUserName: document.getElementById("currentUserName"),
      currentUserRole: document.getElementById("currentUserRole"),
      avatarBadge: document.getElementById("avatarBadge"),
      rangeLabel: document.getElementById("rangeLabel"),
      viewTitle: document.getElementById("viewTitle"),
      viewSubtitle: document.getElementById("viewSubtitle"),
      changeNameButton: document.getElementById("changeNameButton"),
      adminLoginButton: document.getElementById("adminLoginButton"),
      adminLogoutButton: document.getElementById("adminLogoutButton"),
      toast: document.getElementById("toast"),
      selectedDayLabel: document.getElementById("selectedDayLabel"),
      mobileMenuButton: document.getElementById("mobileMenuButton"),
      mobileMenuOverlay: document.getElementById("mobileMenuOverlay"),
      mobileMenuPanel: document.getElementById("mobileMenuPanel")
    };

    let toastTimer = null;
    let unsubscribePosts = null;
    let unsubscribeComments = null;
    let unsubscribeAuth = null;

    const firebaseApp = initializeApp(firebaseConfig);
    const auth = getAuth(firebaseApp);
    const db = getFirestore(firebaseApp);
    const postsCollectionRef = collection(db, FIRESTORE_COLLECTIONS.posts);
    const commentsCollectionRef = collection(db, FIRESTORE_COLLECTIONS.comments);

    function todayKey() {
      const today = new Date();
      const year = today.getFullYear();
      const month = String(today.getMonth() + 1).padStart(2, "0");
      const day = String(today.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function showToast(message) {
      refs.toast.textContent = message;
      refs.toast.style.display = "block";
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        refs.toast.style.display = "none";
      }, 2400);
    }

    function formatDateKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function loadState() {
      const savedName = localStorage.getItem(STORAGE_KEYS.userName);
      state.userName = savedName ? savedName.trim() : "";
    }

    function saveUserName() {
      localStorage.setItem(STORAGE_KEYS.userName, state.userName);
    }

    function normalizePostDoc(snapshot) {
      const data = snapshot.data() || {};
      return {
        id: snapshot.id,
        title: data.title || "",
        body: data.body || "",
        date: data.date || todayKey(),
        category: data.category || "予定",
        classTarget: data.classTarget || "両方",
        createdAt: data.createdAt || new Date(0).toISOString(),
        updatedAt: data.updatedAt || data.createdAt || new Date(0).toISOString()
      };
    }

    function sortPostsByDate(posts) {
      return posts.slice().sort((left, right) => {
        if (left.date !== right.date) return left.date.localeCompare(right.date);
        return left.createdAt.localeCompare(right.createdAt);
      });
    }

    function rebuildPostsFromRemote() {
      const commentsByPost = new Map();
      state.remoteComments.forEach((comment) => {
        if (!comment.postId) return;
        const bucket = commentsByPost.get(comment.postId) || [];
        bucket.push(comment);
        commentsByPost.set(comment.postId, bucket);
      });

      state.posts = sortPostsByDate(
        state.remotePosts.map((post) => ({
          ...post,
          comments: (commentsByPost.get(post.id) || []).sort((a, b) => 
            a.createdAt.localeCompare(b.createdAt)
          )
        }))
      );

      state.syncMode = "remote";
      state.isLoadingRemote = false;
      render();
    }

    function subscribeToFirestoreData() {
      unsubscribePosts = onSnapshot(postsCollectionRef, (snapshot) => {
        state.remotePosts = snapshot.docs.map(normalizePostDoc);
        rebuildPostsFromRemote();
      }, (error) => {
        console.error("投稿データの同期に失敗しました", error);
        state.syncMode = "local";
        state.isLoadingRemote = false;
        render();
      });

      unsubscribeComments = onSnapshot(commentsCollectionRef, (snapshot) => {
        state.remoteComments = snapshot.docs.map((doc) => ({
          id: doc.id,
          postId: doc.data().postId || "",
          author: doc.data().author || "匿名",
          text: doc.data().text || "",
          createdAt: doc.data().createdAt || new Date(0).toISOString()
        }));
        rebuildPostsFromRemote();
      }, (error) => {
        console.error("コメントデータの同期に失敗しました", error);
        state.syncMode = "local";
        state.isLoadingRemote = false;
        render();
      });
    }

    function getVisiblePosts() {
      return state.posts
        .filter(post => state.categoryFilter === "all" || post.category === state.categoryFilter)
        .sort((left, right) => {
          if (left.date !== right.date) return left.date.localeCompare(right.date);
          return left.createdAt.localeCompare(right.createdAt);
        });
    }

    function getPostsForDate(dateKey) {
      return getVisiblePosts().filter((post) => post.date === dateKey);
    }

    function render() {
      renderIdentity();
      renderView();
    }

    function renderIdentity() {
      refs.currentUserName.textContent = state.userName || "名前未設定";
      refs.avatarBadge.textContent = state.userName ? state.userName.trim().charAt(0) : "七";
    }

    function renderView() {
      const today = new Date(state.currentDate.split("-").map(Number).reduce((a, b, i) => 
        i === 0 ? new Date(a, 0, 1) : i === 1 ? new Date(a.getFullYear(), b - 1) : new Date(a.getFullYear(), a.getMonth(), b)
      ));

      refs.rangeLabel.textContent = today.toLocaleDateString("ja-JP", {
        year: "numeric",
        month: "long",
        day: "numeric",
        weekday: "short"
      });

      if (state.isLoadingRemote) {
        refs.viewContainer.innerHTML = `
          <div class="empty-state">共有データを読み込み中です...</div>
        `;
        return;
      }

      const posts = getPostsForDate(state.currentDate);

      if (!posts.length) {
        refs.viewContainer.innerHTML = `
          <div class="empty-state">
            この日には投稿がありません。
          </div>
        `;
        return;
      }

      refs.viewContainer.innerHTML = posts.map(post => `
        <div class="panel frosted" style="padding: 20px;">
          <h3 style="font-size: 1.2rem; margin-bottom: 12px;">${post.title}</h3>
          <p style="color: #6b7280; line-height: 1.6;">${post.body}</p>
          <p style="font-size: 0.9rem; color: #9ca3af; margin-top: 12px;">
            カテゴリ: ${post.category} | クラス: ${post.classTarget}
          </p>
        </div>
      `).join("");
    }

    function setupMobileMenu() {
      refs.mobileMenuButton.addEventListener("click", () => {
        const isActive = refs.mobileMenuPanel.classList.contains("active");
        refs.mobileMenuPanel.classList.toggle("active");
        refs.mobileMenuOverlay.classList.toggle("active");
      });

      refs.mobileMenuOverlay.addEventListener("click", () => {
        refs.mobileMenuPanel.classList.remove("active");
        refs.mobileMenuOverlay.classList.remove("active");
      });

      document.querySelectorAll(".mobile-menu-item").forEach(item => {
        item.addEventListener("click", () => {
          const filter = item.dataset.filter;
          state.categoryFilter = filter;
          
          // PCのチップボタンも更新
          document.querySelectorAll("[data-category-filter]").forEach(btn => {
            btn.classList.toggle("active", btn.dataset.categoryFilter === filter);
          });

          render();
          refs.mobileMenuPanel.classList.remove("active");
          refs.mobileMenuOverlay.classList.remove("active");
        });
      });
    }

    function setupCategoryFilter() {
      document.querySelectorAll("[data-category-filter]").forEach(btn => {
        btn.addEventListener("click", () => {
          state.categoryFilter = btn.dataset.categoryFilter;
          document.querySelectorAll("[data-category-filter]").forEach(b => {
            b.classList.toggle("active", b.dataset.categoryFilter === state.categoryFilter);
          });
          render();
        });
      });
    }

    function setupAdminButtons() {
      refs.adminLoginButton.addEventListener("click", () => {
        const email = prompt("メールアドレスを入力してください:");
        if (!email) return;
        
        const password = prompt("パスワードを入力してください:");
        if (!password) return;

        signInWithEmailAndPassword(auth, email, password)
          .then(() => {
            showToast("管理者モードを有効にしました。");
          })
          .catch((error) => {
            showToast("ログインに失敗しました。");
            console.error(error);
          });
      });

      refs.adminLogoutButton.addEventListener("click", () => {
        signOut(auth)
          .then(() => {
            showToast("管理者モードを終了しました。");
          })
          .catch((error) => {
            showToast("ログアウトに失敗しました。");
            console.error(error);
          });
      });
    }

    async function init() {
      loadState();
      setupMobileMenu();
      setupCategoryFilter();
      setupAdminButtons();
      render();
      subscribeToFirestoreData();

      unsubscribeAuth = onAuthStateChanged(auth, (user) => {
        if (user) {
          state.authUser = user;
          state.isAdmin = true;
          refs.adminLoginButton.hidden = true;
          refs.adminLogoutButton.hidden = false;
        } else {
          state.authUser = null;
          state.isAdmin = false;
          refs.adminLoginButton.hidden = false;
          refs.adminLogoutButton.hidden = true;
        }
      });
    }

    init().catch((error) => {
      console.error("初期化に失敗しました", error);
      showToast("初期化に失敗しました。");
    });
  </script>
</body>
</html>
