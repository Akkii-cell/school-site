<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>港区白金の丘中学校 第7学年 共有サイト</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f5f7;
      --surface: rgba(255, 255, 255, 0.92);
      --border: rgba(15, 23, 42, 0.08);
      --text: #111827;
      --muted: #6b7280;
      --accent: #0071e3;
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --max-width: 1220px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "SF Pro Display", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, rgba(0, 113, 227, 0.08), transparent 32%), radial-gradient(circle at top right, rgba(15, 169, 107, 0.08), transparent 28%), var(--bg);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button, input, select, textarea { font: inherit; }
    img { max-width: 100%; display: block; }
    button { border: none; cursor: pointer; }

    .shell {
      width: min(var(--max-width), calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 calc(80px + env(safe-area-inset-bottom));
    }

    .card, .frosted, .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
    }

    .hero-card {
      padding: 32px;
      overflow: hidden;
      position: relative;
    }

    h1, h2, h3, h4, p { margin: 0; }

    .hero-title {
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 1.08;
      letter-spacing: -0.04em;
      margin-bottom: 14px;
    }

    .hero-lead {
      max-width: 60ch;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
    }

    .toolbar {
      display: grid;
      gap: 16px;
      padding: 22px;
      margin-bottom: 18px;
    }

    .toolbar-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
    }

    .date-nav {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .date-display {
      font-size: 1.1rem;
      font-weight: 700;
      min-width: 220px;
    }

    .chip {
      min-height: 46px;
      padding: 0 15px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.05);
      color: #334155;
      font-weight: 700;
    }

    .chip.active {
      background: rgba(0, 113, 227, 0.12);
      color: var(--accent);
    }

    .panel {
      padding: 24px;
    }

    .panel-title {
      font-size: 1.2rem;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
    }

    .post-card {
      border: 1px solid rgba(148, 163, 184, 0.16);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(248, 250, 252, 0.92));
      border-radius: var(--radius-lg);
      padding: 22px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
      margin-bottom: 16px;
    }

    .post-body {
      color: #344054;
      line-height: 1.8;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      margin-bottom: 16px;
    }

    .post-image {
      width: 100%;
      max-width: 400px;
      border-radius: 12px;
      margin-bottom: 16px;
      display: block;
    }

    .post-link {
      display: inline-block;
      padding: 10px 14px;
      background: rgba(0, 113, 227, 0.1);
      border-radius: 8px;
      color: var(--accent);
      text-decoration: none;
      margin-bottom: 16px;
      word-break: break-all;
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      margin-right: 8px;
      margin-bottom: 8px;
    }

    .badge.schedule { background: rgba(0, 113, 227, 0.1); color: #0071e3; }
    .badge.homework { background: rgba(15, 159, 110, 0.12); color: #0f9f6e; }
    .badge.notice { background: rgba(217, 119, 6, 0.12); color: #d97706; }

    .comment-item {
      background: rgba(248, 250, 252, 0.9);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }

    .comment-author {
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 4px;
    }

    .comment-text {
      color: #374151;
      line-height: 1.6;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      margin-bottom: 8px;
    }

    .comment-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .rating-btn {
      background: rgba(0, 0, 0, 0.05);
      border: 1px solid transparent;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .rating-btn:hover {
      background: rgba(0, 113, 227, 0.1);
    }

    .empty-state {
      padding: 28px 22px;
      border-radius: 20px;
      background: rgba(248, 250, 252, 0.9);
      border: 1px dashed var(--border);
      color: var(--muted);
      line-height: 1.8;
      text-align: center;
    }

    .button, .ghost-button, .danger-button, .report-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 48px;
      padding: 0 16px;
      border-radius: 999px;
      font-weight: 700;
      transition: transform 0.18s ease;
    }

    .button {
      background: linear-gradient(135deg, #0071e3, #2e90fa);
      color: #fff;
      box-shadow: 0 16px 32px rgba(0, 113, 227, 0.22);
    }

    .ghost-button {
      background: rgba(255, 255, 255, 0.88);
      color: #1f2937;
      border: 1px solid var(--border);
    }

    .danger-button {
      background: rgba(217, 45, 32, 0.12);
      color: #d92d20;
    }

    .report-button {
      background: rgba(217, 119, 6, 0.12);
      color: #d97706;
      min-height: 32px;
      padding: 0 12px;
      font-size: 0.85rem;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 22px;
      background: rgba(15, 23, 42, 0.44);
      backdrop-filter: blur(16px);
      z-index: 100;
      opacity: 1;
      pointer-events: auto;
    }

    .modal.hidden {
      opacity: 0;
      pointer-events: none;
      display: none;
    }

    .modal-panel {
      width: min(720px, 100%);
      max-height: 90vh;
      overflow: auto;
      padding: 28px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid var(--border);
      box-shadow: 0 30px 70px rgba(15, 23, 42, 0.22);
    }

    .modal-title {
      font-size: 1.55rem;
      letter-spacing: -0.04em;
      margin-bottom: 16px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(18px);
      padding: 14px 18px;
      border-radius: 999px;
      background: rgba(17, 24, 39, 0.92);
      color: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
      z-index: 120;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .pending-screen {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: var(--bg);
    }

    .pending-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 40px;
      max-width: 600px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .file-input-wrapper {
      position: relative;
      overflow: hidden;
      display: inline-block;
    }

    .file-input-wrapper input[type="file"] {
      position: absolute;
      left: -9999px;
    }

    .file-input-label {
      display: inline-block;
      padding: 8px 12px;
      background: rgba(0, 113, 227, 0.1);
      color: var(--accent);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .image-preview {
      max-width: 200px;
      max-height: 150px;
      margin-top: 8px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <!-- ログイン画面 -->
  <div class="modal" id="loginModal">
    <div class="modal-panel" style="width: min(520px, 100%);">
      <h2 class="modal-title">ログイン</h2>
      <p style="color: var(--muted); margin-bottom: 24px;">メールアドレスでログイン</p>
      <form id="emailLoginForm" style="display: grid; gap: 12px;">
        <input id="emailInput" type="email" placeholder="メールアドレス" required style="padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px;">
        <input id="passwordInput" type="password" placeholder="パスワード" required style="padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px;">
        <button type="submit" class="button" style="width: 100%;">ログイン</button>
      </form>
    </div>
  </div>

  <!-- 初回セットアップモーダル -->
  <div class="modal hidden" id="setupModal">
    <div class="modal-panel" style="width: min(520px, 100%); max-height: 90vh; overflow-y: auto;">
      <h2 class="modal-title">はじめてのご利用</h2>
      <p style="color: var(--muted); margin-bottom: 20px;">お名前とクラスを入力してください。</p>
      <form id="setupForm" style="display: grid; gap: 16px;">
        <div style="display: grid; gap: 8px;">
          <label for="setupName" style="font-weight: 700;">お名前</label>
          <input id="setupName" type="text" maxlength="30" placeholder="例：白金 太郎" required style="padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px;">
        </div>
        <div style="display: grid; gap: 8px;">
          <label for="setupClass" style="font-weight: 700;">クラス</label>
          <select id="setupClass" required style="padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px;">
            <option value="">選択してください</option>
            <option value="7-1">7-1組</option>
            <option value="7-2">7-2組</option>
          </select>
        </div>
        <label style="display: flex; align-items: center; gap: 8px;">
          <input id="agreeCheckbox" type="checkbox" required>
          <span style="font-size: 0.9rem;">利用規約に同意します</span>
        </label>
        <button type="submit" class="button" style="width: 100%;">始める</button>
      </form>
    </div>
  </div>

  <!-- メインサイト -->
  <div id="mainContent" style="display: none;">
    <div style="position: fixed; bottom: 16px; right: 16px; z-index: 100; display: flex; gap: 8px;">
      <button class="ghost-button" id="logoutButton" type="button" style="min-height: 40px; padding: 0 12px; font-size: 0.85rem;">ログアウト</button>
    </div>

    <main class="shell">
      <section class="site-header">
        <article class="hero-card frosted">
          <h1 class="hero-title">予定・宿題・連絡</h1>
          <p class="hero-lead" id="heroLead">共有サイト</p>
        </article>
      </section>

      <section class="toolbar frosted">
        <div class="toolbar-row">
          <div class="date-nav">
            <button class="ghost-button" id="prevDateButton" type="button">← 前日</button>
            <div class="date-display" id="dateDisplay">読み込み中...</div>
            <button class="ghost-button" id="nextDateButton" type="button">次日 →</button>
          </div>
        </div>
      </section>

      <section id="adminPostForm" style="display: none;">
        <div class="panel frosted">
          <h3 class="panel-title">投稿</h3>
          <form id="postForm" style="display: grid; gap: 16px;">
            <input id="postTitle" type="text" maxlength="100" placeholder="タイトル" required style="padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px;">
            <textarea id="postBody" placeholder="内容" required style="padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px; min-height: 100px;"></textarea>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
              <select id="postCategory" required style="padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px;">
                <option value="予定">予定</option>
                <option value="宿題">宿題</option>
                <option value="連絡事項">連絡事項</option>
              </select>
              <select id="postTarget" required style="padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px;">
                <option value="両方">全体向け</option>
                <option value="7-1">7-1組</option>
                <option value="7-2">7-2組</option>
              </select>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
              <input id="postStartDate" type="date" required style="padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px;">
              <input id="postEndDate" type="date" required style="padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px;">
            </div>
            <button type="submit" class="button">投稿</button>
          </form>
        </div>
      </section>

      <section id="postsContainer"></section>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import {
      getFirestore,
      collection,
      onSnapshot,
      addDoc,
      deleteDoc,
      doc,
      updateDoc,
      query,
      orderBy,
      limit,
      increment,
      serverTimestamp,
      getDocs
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import {
      getStorage,
      ref,
      uploadBytes,
      getDownloadURL
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAkMLCyIC0x9bT63LEih1x7BXe3XYVuknQ",
      authDomain: "school-site-475fc.firebaseapp.com",
      projectId: "school-site-475fc",
      storageBucket: "school-site-475fc.firebasestorage.app",
      messagingSenderId: "69139986081",
      appId: "1:69139986081:web:11c1b1b8277e503e9ee2e0"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const auth = getAuth(firebaseApp);
    const db = getFirestore(firebaseApp);
    const storage = getStorage(firebaseApp);

    const ADMIN_EMAIL = "daishi_a@icloud.com";
    const NG_WORDS = ["死ね", "うざい", "きもい", "バカ", "アホ", "クズ"];

    const state = {
      user: null,
      isAdmin: false,
      userName: "",
      userClass: "",
      currentDate: new Date(),
      posts: [],
      comments: {},
      commentUnsubscribes: {},
      postUnsubscribe: null,
      dateButtonListenersAttached: false
    };

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2400);
    }

    function getLocalDateString(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function updateDateDisplay() {
      const options = { year: "numeric", month: "long", day: "numeric", weekday: "short" };
      document.getElementById("dateDisplay").textContent = state.currentDate.toLocaleDateString("ja-JP", options);
    }

    function attachDateButtonListeners() {
      if (state.dateButtonListenersAttached) return;

      document.getElementById("prevDateButton")?.addEventListener("click", () => {
        state.currentDate.setDate(state.currentDate.getDate() - 1);
        updateDateDisplay();
        renderPosts();
      });

      document.getElementById("nextDateButton")?.addEventListener("click", () => {
        state.currentDate.setDate(state.currentDate.getDate() + 1);
        updateDateDisplay();
        renderPosts();
      });

      state.dateButtonListenersAttached = true;
    }

    function filterPosts() {
      const currentDateStr = getLocalDateString(state.currentDate);
      return state.posts.filter(post => {
        const matchesClass = state.isAdmin ? true : (post.classTarget === "両方" || post.classTarget === state.userClass);
        const isInRange = currentDateStr >= post.startDate && currentDateStr <= post.endDate;
        return matchesClass && isInRange;
      });
    }

    function renderPosts() {
      const container = document.getElementById("postsContainer");
      const filtered = filterPosts();

      container.innerHTML = "";

      if (filtered.length === 0) {
        container.innerHTML = `<div class="empty-state">投稿がありません</div>`;
        return;
      }

      const postsHTML = filtered.map(post => {
        return `
          <div class="post-card">
            <div class="post-header">
              <h3 class="post-title">${post.title}</h3>
              ${state.isAdmin ? `<button class="danger-button deletePost-btn" data-post-id="${post.id}" style="min-height: 36px; padding: 0 12px; font-size: 0.85rem;">削除</button>` : ""}
            </div>
            <div style="margin-bottom: 12px;">
              <span class="badge ${getCategoryClass(post.category)}">${post.category}</span>
            </div>
            <p class="post-body">${post.body}</p>
            
            <div style="margin-top: 16px; border-top: 1px solid rgba(148, 163, 184, 0.16); padding-top: 16px;">
              <div id="comments-${post.id}" style="display: grid; gap: 12px; margin-bottom: 12px;"></div>
              <form class="addComment-form" data-post-id="${post.id}" style="display: grid; gap: 10px;">
                <textarea placeholder="コメント..." required style="padding: 10px 12px; border: 1px solid var(--border); border-radius: 12px; min-height: 60px; font-family: inherit;"></textarea>
                <button type="submit" class="button" style="align-self: flex-start;">送信</button>
              </form>
            </div>
          </div>
        `;
      }).join("");

      container.innerHTML = postsHTML;

      state.posts.forEach(post => {
        const commentsContainer = document.getElementById(`comments-${post.id}`);
        if (commentsContainer) {
          const postComments = state.comments[post.id] || [];
          commentsContainer.innerHTML = postComments.length > 0
            ? postComments.map(comment => `
                <div class="comment-item">
                  <div class="comment-author">${comment.author}</div>
                  <div class="comment-text">${comment.text}</div>
                  <div class="comment-actions">
                    <button class="rating-btn addLike-btn" data-post-id="${post.id}" data-comment-id="${comment.id}">👍 ${comment.likes || 0}</button>
                    ${state.isAdmin || state.user.uid === comment.uid ? `<button class="danger-button deleteComment-btn" data-post-id="${post.id}" data-comment-id="${comment.id}" style="min-height: 32px; padding: 0 12px; font-size: 0.8rem;">削除</button>` : ""}
                  </div>
                </div>
              `).join("")
            : `<p style="color: var(--muted); font-size: 0.9rem;">コメントなし</p>`;
        }
      });
    }

    function getCategoryClass(category) {
      const classes = { "予定": "schedule", "宿題": "homework", "連絡事項": "notice" };
      return classes[category] || "schedule";
    }

    function clearCommentListeners() {
      Object.values(state.commentUnsubscribes).forEach(unsub => typeof unsub === "function" && unsub());
      state.commentUnsubscribes = {};
      state.comments = {};
    }

    document.addEventListener("click", async (e) => {
      if (e.target.classList.contains("deletePost-btn")) {
        const postId = e.target.dataset.postId;
        if (!confirm("削除しますか？")) return;
        try {
          const commentsRef = collection(db, "posts", postId, "comments");
          const commentDocs = await getDocs(commentsRef);
          for (const commentDoc of commentDocs.docs) {
            await deleteDoc(commentDoc.ref);
          }
          await deleteDoc(doc(db, "posts", postId));
          showToast("削除しました");
        } catch (error) {
          console.error(error);
          showToast("削除失敗");
        }
      }

      if (e.target.classList.contains("deleteComment-btn")) {
        const postId = e.target.dataset.postId;
        const commentId = e.target.dataset.commentId;
        if (!confirm("削除しますか？")) return;
        try {
          await deleteDoc(doc(db, "posts", postId, "comments", commentId));
          showToast("削除しました");
        } catch (error) {
          showToast("削除失敗");
        }
      }

      if (e.target.classList.contains("addLike-btn")) {
        const postId = e.target.dataset.postId;
        const commentId = e.target.dataset.commentId;
        try {
          await updateDoc(doc(db, "posts", postId, "comments", commentId), { likes: increment(1) });
        } catch (error) {
          showToast("いいね失敗");
        }
      }
    });

    document.addEventListener("submit", async (e) => {
      if (e.target.id === "postForm") {
        e.preventDefault();
        try {
          await addDoc(collection(db, "posts"), {
            title: document.getElementById("postTitle").value,
            body: document.getElementById("postBody").value,
            category: document.getElementById("postCategory").value,
            classTarget: document.getElementById("postTarget").value,
            startDate: document.getElementById("postStartDate").value,
            endDate: document.getElementById("postEndDate").value,
            createdAt: serverTimestamp(),
            uid: state.user.uid
          });
          document.getElementById("postForm").reset();
          showToast("投稿しました");
        } catch (error) {
          showToast("投稿失敗");
        }
      }

      if (e.target.id === "emailLoginForm") {
        e.preventDefault();
        const email = document.getElementById("emailInput").value;
        const password = document.getElementById("passwordInput").value;

        try {
          try {
            await signInWithEmailAndPassword(auth, email, password);
          } catch (loginError) {
            if (loginError.code === "auth/user-not-found" || loginError.code === "auth/invalid-credential") {
              await createUserWithEmailAndPassword(auth, email, password);
            } else {
              throw loginError;
            }
          }
        } catch (error) {
          showToast("ログイン失敗");
        }
      }

      if (e.target.id === "setupForm") {
        e.preventDefault();
        state.userName = document.getElementById("setupName").value;
        state.userClass = document.getElementById("setupClass").value;
        localStorage.setItem(`user_setup_${state.user.uid}`, JSON.stringify({ name: state.userName, class: state.userClass }));

        document.getElementById("setupModal").classList.add("hidden");
        document.getElementById("mainContent").style.display = "block";

        clearCommentListeners();
        attachDateButtonListeners();

        if (state.postUnsubscribe) state.postUnsubscribe();

        const postsRef = query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(100));
        state.postUnsubscribe = onSnapshot(postsRef, (snapshot) => {
          state.posts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          
          state.posts.forEach(post => {
            if (!state.commentUnsubscribes[post.id]) {
              const commentsRef = query(collection(db, "posts", post.id, "comments"), orderBy("createdAt", "asc"));
              state.commentUnsubscribes[post.id] = onSnapshot(commentsRef, (commentSnapshot) => {
                state.comments[post.id] = commentSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderPosts();
              });
            }
          });
          
          renderPosts();
        });

        document.getElementById("postsContainer").addEventListener("submit", async (e) => {
          const form = e.target.closest(".addComment-form");
          if (!form) return;
          e.preventDefault();
          const postId = form.dataset.postId;
          const text = form.querySelector("textarea").value.trim();
          if (!text) return;
          
          for (const word of NG_WORDS) {
            if (text.includes(word)) {
              showToast("不適切な言葉が含まれています");
              return;
            }
          }

          try {
            await addDoc(collection(db, "posts", postId, "comments"), {
              author: state.userName,
              text: text,
              createdAt: serverTimestamp(),
              likes: 0,
              uid: state.user.uid
            });
            form.querySelector("textarea").value = "";
            showToast("コメント追加");
          } catch (error) {
            showToast("コメント失敗");
          }
        });

        showToast(`${state.userName} でスタート`);
      }
    });

    document.getElementById("logoutButton")?.addEventListener("click", async () => {
      clearCommentListeners();
      await signOut(auth);
      showToast("ログアウト");
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        clearCommentListeners();
        document.getElementById("loginModal").classList.remove("hidden");
        document.getElementById("mainContent").style.display = "none";
        return;
      }

      state.user = user;

      if (user.email === ADMIN_EMAIL) {
        state.isAdmin = true;
        state.userName = "管理者";
        state.userClass = "ALL";

        document.getElementById("loginModal").classList.add("hidden");
        document.getElementById("mainContent").style.display = "block";
        document.getElementById("setupModal").classList.add("hidden");
        
        document.getElementById("adminPostForm").style.display = "block";

        attachDateButtonListeners();

        if (state.postUnsubscribe) state.postUnsubscribe();

        const postsRef = query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(100));
        state.postUnsubscribe = onSnapshot(postsRef, (snapshot) => {
          state.posts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          
          state.posts.forEach(post => {
            if (!state.commentUnsubscribes[post.id]) {
              const commentsRef = query(collection(db, "posts", post.id, "comments"), orderBy("createdAt", "asc"));
              state.commentUnsubscribes[post.id] = onSnapshot(commentsRef, (commentSnapshot) => {
                state.comments[post.id] = commentSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderPosts();
              });
            }
          });
          
          renderPosts();
        });

        document.getElementById("postsContainer").addEventListener("submit", async (e) => {
          const form = e.target.closest(".addComment-form");
          if (!form) return;
          e.preventDefault();
          const postId = form.dataset.postId;
          const text = form.querySelector("textarea").value.trim();
          if (!text) return;

          try {
            await addDoc(collection(db, "posts", postId, "comments"), {
              author: state.userName,
              text: text,
              createdAt: serverTimestamp(),
              likes: 0,
              uid: state.user.uid
            });
            form.querySelector("textarea").value = "";
            showToast("コメント追加");
          } catch (error) {
            showToast("コメント失敗");
          }
        });

        return;
      }

      const savedSetup = localStorage.getItem(`user_setup_${user.uid}`);
      
      if (!savedSetup) {
        document.getElementById("loginModal").classList.add("hidden");
        document.getElementById("mainContent").style.display = "none";
        document.getElementById("setupModal").classList.remove("hidden");
        return;
      }
      
      const setup = JSON.parse(savedSetup);
      state.userName = setup.name;
      state.userClass = setup.class;
      
      document.getElementById("loginModal").classList.add("hidden");
      document.getElementById("mainContent").style.display = "block";
      document.getElementById("setupModal").classList.add("hidden");
      
      document.getElementById("adminPostForm").style.display = "none";

      clearCommentListeners();
      attachDateButtonListeners();

      if (state.postUnsubscribe) state.postUnsubscribe();

      const postsRef = query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(100));
      state.postUnsubscribe = onSnapshot(postsRef, (snapshot) => {
        state.posts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        
        state.posts.forEach(post => {
          if (!state.commentUnsubscribes[post.id]) {
            const commentsRef = query(collection(db, "posts", post.id, "comments"), orderBy("createdAt", "asc"));
            state.commentUnsubscribes[post.id] = onSnapshot(commentsRef, (commentSnapshot) => {
              state.comments[post.id] = commentSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              renderPosts();
            });
          }
        });
        
        renderPosts();
      });

      document.getElementById("postsContainer").addEventListener("submit", async (e) => {
        const form = e.target.closest(".addComment-form");
        if (!form) return;
        e.preventDefault();
        const postId = form.dataset.postId;
        const text = form.querySelector("textarea").value.trim();
        if (!text) return;
        
        for (const word of NG_WORDS) {
          if (text.includes(word)) {
            showToast("不適切な言葉");
            return;
          }
        }

        try {
          await addDoc(collection(db, "posts", postId, "comments"), {
            author: state.userName,
            text: text,
            createdAt: serverTimestamp(),
            likes: 0,
            uid: state.user.uid
          });
          form.querySelector("textarea").value = "";
          showToast("コメント追加");
        } catch (error) {
          showToast("コメント失敗");
        }
      });
    });

    updateDateDisplay();
  </script>
</body>
</html>
