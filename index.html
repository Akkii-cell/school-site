<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>港区白金の丘中学校 第7学年 共有サイト</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f5f7;
      --surface: rgba(255, 255, 255, 0.92);
      --surface-strong: #ffffff;
      --surface-soft: #fafafc;
      --border: rgba(15, 23, 42, 0.08);
      --text: #111827;
      --muted: #6b7280;
      --muted-soft: #94a3b8;
      --accent: #0071e3;
      --accent-soft: rgba(0, 113, 227, 0.1);
      --success: #0f9f6e;
      --warning: #d97706;
      --danger: #d92d20;
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      --shadow-soft: 0 10px 24px rgba(15, 23, 42, 0.06);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --radius-sm: 14px;
      --max-width: 1220px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "SF Pro Display", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, rgba(0, 113, 227, 0.08), transparent 32%), radial-gradient(circle at top right, rgba(15, 169, 107, 0.08), transparent 28%), var(--bg);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }

    button, input, select, textarea { font: inherit; }
    img { max-width: 100%; display: block; }
    button { border: none; cursor: pointer; }

    .shell {
      width: min(var(--max-width), calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 calc(80px + env(safe-area-inset-bottom));
    }

    .site-header {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      align-items: stretch;
      margin-bottom: 18px;
    }

    .card, .frosted, .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
    }

    .hero-card {
      padding: 32px;
      overflow: hidden;
      position: relative;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      inset: auto -100px -120px auto;
      width: 280px;
      height: 280px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(0, 113, 227, 0.16), transparent 62%);
      pointer-events: none;
    }

    h1, h2, h3, h4, p { margin: 0; }

    .hero-title {
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 1.08;
      letter-spacing: -0.04em;
      margin-bottom: 14px;
      max-width: 12ch;
    }

    .hero-lead {
      max-width: 60ch;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
    }

    .toolbar {
      display: grid;
      gap: 16px;
      padding: 22px;
      margin-bottom: 18px;
    }

    .toolbar-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
    }

    .date-nav {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .range-label {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      min-width: 220px;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip {
      min-height: 46px;
      padding: 0 15px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.05);
      color: #334155;
      font-weight: 700;
    }

    .chip.active {
      background: rgba(0, 113, 227, 0.12);
      color: var(--accent);
    }

    .main-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.6fr) minmax(280px, 0.9fr);
      gap: 18px;
      align-items: start;
    }

    .primary-column, .secondary-column {
      display: grid;
      gap: 18px;
    }

    .panel {
      padding: 24px;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .panel-title {
      font-size: 1.2rem;
      letter-spacing: -0.03em;
    }

    .panel-subtitle {
      color: var(--muted);
      font-size: 0.92rem;
      margin-top: 4px;
    }

    .post-card {
      border: 1px solid rgba(148, 163, 184, 0.16);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(248, 250, 252, 0.92));
      border-radius: var(--radius-lg);
      padding: 22px;
      box-shadow: var(--shadow-soft);
    }

    .post-meta {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .post-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge.schedule { background: rgba(0, 113, 227, 0.1); color: var(--accent); }
    .badge.homework { background: rgba(15, 159, 110, 0.12); color: var(--success); }
    .badge.notice { background: rgba(217, 119, 6, 0.12); color: var(--warning); }
    .badge.class-badge { background: rgba(15, 23, 42, 0.06); color: #334155; }

    .post-date {
      color: var(--muted);
      font-size: 0.92rem;
      white-space: nowrap;
    }

    .post-title {
      font-size: clamp(1.25rem, 2vw, 1.45rem);
      line-height: 1.25;
      letter-spacing: -0.03em;
      margin-bottom: 12px;
    }

    .post-body {
      color: #344054;
      line-height: 1.8;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .empty-state {
      padding: 28px 22px;
      border-radius: 20px;
      background: rgba(248, 250, 252, 0.9);
      border: 1px dashed rgba(148, 163, 184, 0.22);
      color: var(--muted);
      line-height: 1.8;
    }

    .button, .ghost-button, .tonal-button, .danger-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 48px;
      padding: 0 16px;
      border-radius: 999px;
      font-weight: 700;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .button {
      background: linear-gradient(135deg, #0071e3, #2e90fa);
      color: #fff;
      box-shadow: 0 16px 32px rgba(0, 113, 227, 0.22);
    }

    .ghost-button {
      background: rgba(255, 255, 255, 0.88);
      color: #1f2937;
      border: 1px solid rgba(148, 163, 184, 0.18);
    }

    .tonal-button {
      background: rgba(0, 113, 227, 0.1);
      color: var(--accent);
    }

    .danger-button {
      background: rgba(217, 45, 32, 0.12);
      color: var(--danger);
    }

    .modal {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 22px;
      background: rgba(15, 23, 42, 0.44);
      backdrop-filter: blur(16px);
      z-index: 100;
      opacity: 1;
      pointer-events: auto;
      transition: opacity 0.2s ease;
    }

    .modal.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .modal-panel {
      width: min(720px, 100%);
      max-height: min(90vh, 960px);
      overflow: auto;
      padding: 28px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid rgba(148, 163, 184, 0.16);
      box-shadow: 0 30px 70px rgba(15, 23, 42, 0.22);
    }

    .modal-panel.narrow {
      width: min(520px, 100%);
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 20px;
    }

    .modal-title {
      font-size: 1.55rem;
      letter-spacing: -0.04em;
      margin-bottom: 6px;
    }

    .close-button {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.06);
      color: #334155;
      flex-shrink: 0;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(24px + env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(18px);
      padding: 14px 18px;
      border-radius: 999px;
      background: rgba(17, 24, 39, 0.92);
      color: #fff;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
      z-index: 120;
      max-width: calc(100vw - 32px);
      text-align: center;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* スマホ用ハンバーガーメニュー - スマホのみ表示 */
    .mobile-menu-button {
      display: none;
      position: fixed;
      top: 16px;
      right: 16px;
      background: var(--accent);
      color: #fff;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      font-size: 24px;
      z-index: 500;
    }

    .mobile-menu-panel {
      display: none;
      position: fixed;
      top: 70px;
      right: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      z-index: 450;
      padding: 12px;
      gap: 8px;
      flex-direction: column;
      min-width: 160px;
    }

    .mobile-menu-panel.active {
      display: flex;
    }

    .mobile-menu-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.3);
      z-index: 400;
    }

    .mobile-menu-overlay.active {
      display: block;
    }

    .mobile-menu-item {
      padding: 12px 16px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      background: rgba(0, 113, 227, 0.1);
      color: var(--accent);
      transition: background 0.18s ease;
      font-size: 0.95rem;
    }

    .mobile-menu-item:hover {
      background: rgba(0, 113, 227, 0.2);
    }

    /* フッター管理者ボタン */
    .admin-footer {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 100;
    }

    .admin-button-small {
      min-height: 40px;
      padding: 0 12px;
      font-size: 0.85rem;
    }

    @media (max-width: 768px) {
      .shell {
        width: min(calc(100vw - 18px), var(--max-width));
        padding-top: 14px;
        padding-bottom: calc(100px + env(safe-area-inset-bottom));
      }

      /* スマホ版はハンバーガーメニュー表示 */
      .mobile-menu-button {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .main-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .post-card {
        padding: 18px;
      }

      .panel {
        padding: 20px;
      }

      .hero-card, .panel {
        border-radius: 24px;
      }

      .chip-row {
        display: none;
      }
    }

    @media (max-width: 480px) {
      .shell {
        width: min(calc(100vw - 12px), var(--max-width));
      }

      .hero-card, .panel, .post-card {
        border-radius: 20px;
        padding-left: 16px;
        padding-right: 16px;
      }

      .range-label {
        font-size: 1rem;
      }

      .hero-title {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <!-- スマホ用ハンバーガーメニュー -->
  <button class="mobile-menu-button" id="mobileMenuButton" type="button">≡</button>
  <div class="mobile-menu-overlay" id="mobileMenuOverlay"></div>
  <div class="mobile-menu-panel" id="mobileMenuPanel">
    <button class="mobile-menu-item" data-filter="all">すべて</button>
    <button class="mobile-menu-item" data-filter="予定">予定</button>
    <button class="mobile-menu-item" data-filter="宿題">宿題</button>
    <button class="mobile-menu-item" data-filter="連絡事項">連絡事項</button>
  </div>

  <!-- フッター管理者ボタン -->
  <div class="admin-footer">
    <button class="button admin-button-small" id="adminLoginButton" type="button">管理者</button>
    <button class="danger-button admin-button-small" id="adminLogoutButton" type="button" hidden>ログアウト</button>
  </div>

  <main class="shell">
    <section class="site-header">
      <article class="hero-card frosted">
        <h1 class="hero-title">予定・宿題・連絡を、毎日見やすく。</h1>
        <p class="hero-lead">
          1組・2組向けに、授業予定、宿題、連絡事項をひとつにまとめた共有サイトです。
          コメントや画像付きのやり取りにも対応し、ブラウザだけでそのまま使えます。
        </p>
      </article>
    </section>

    <section class="toolbar frosted">
      <div class="toolbar-row">
        <div class="date-nav">
          <button class="ghost-button" type="button" data-nav="prev">前へ</button>
          <button class="ghost-button" type="button" data-nav="today">今日</button>
          <button class="ghost-button" type="button" data-nav="next">次へ</button>
          <div class="range-label" id="rangeLabel">読み込み中...</div>
        </div>
      </div>

      <div class="toolbar-row">
        <div class="chip-row" id="categoryFilterRow">
          <button class="chip active" data-category-filter="all">すべて</button>
          <button class="chip" data-category-filter="予定">予定</button>
          <button class="chip" data-category-filter="宿題">宿題</button>
          <button class="chip" data-category-filter="連絡事項">連絡事項</button>
        </div>
      </div>
    </section>

    <section class="main-grid">
      <div class="primary-column">
        <section class="panel frosted">
          <div class="panel-head">
            <div>
              <h2 class="panel-title" id="viewTitle">投稿一覧</h2>
              <p class="panel-subtitle" id="viewSubtitle">読み込み中...</p>
            </div>
          </div>
          <div id="viewContainer"></div>
        </section>
      </div>

      <aside class="secondary-column">
        <section class="panel frosted">
          <div class="panel-head">
            <div>
              <h2 class="panel-title">選択した日</h2>
              <p class="panel-subtitle" id="selectedDayLabel">読み込み中...</p>
            </div>
          </div>
          <div id="selectedDayPanel"></div>
        </section>
      </aside>
    </section>
  </main>

  <div class="modal hidden" id="adminModal" role="dialog" aria-modal="true" aria-labelledby="adminModalTitle">
    <div class="modal-panel narrow">
      <div class="modal-head">
        <div>
          <h2 class="modal-title" id="adminModalTitle">管理者ログイン</h2>
          <p style="color: var(--muted); font-size: 0.9rem; margin-top: 4px;">
            メールアドレスとパスワードを入力してください。
          </p>
        </div>
        <button class="close-button" type="button" data-close-modal="adminModal">×</button>
      </div>
      <form id="adminForm" class="form-grid">
        <div style="display: grid; gap: 8px;">
          <label for="adminEmail" style="font-size: 0.92rem; font-weight: 700;">メールアドレス</label>
          <input id="adminEmail" type="email" placeholder="daishi_a@icloud.com" required style="width: 100%; padding: 12px 14px; border: 1px solid rgba(148, 163, 184, 0.22); border-radius: 12px; font-size: 0.95rem;">
        </div>
        <div style="display: grid; gap: 8px;">
          <label for="adminPassword" style="font-size: 0.92rem; font-weight: 700;">パスワード</label>
          <input id="adminPassword" type="password" placeholder="パスワード" required style="width: 100%; padding: 12px 14px; border: 1px solid rgba(148, 163, 184, 0.22); border-radius: 12px; font-size: 0.95rem;">
        </div>
        <div class="modal-actions">
          <button class="ghost-button" type="button" data-close-modal="adminModal">キャンセル</button>
          <button class="button" type="submit">ログイン</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    import {
      getFirestore,
      collection,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAkMLCyIC0x9bT63LEih1x7BXe3XYVuknQ",
      authDomain: "school-site-475fc.firebaseapp.com",
      projectId: "school-site-475fc",
      storageBucket: "school-site-475fc.firebasestorage.app",
      messagingSenderId: "69139986081",
      appId: "1:69139986081:web:11c1b1b8277e503e9ee2e0",
      measurementId: "G-SCENXEX3ZH"
    };

    const state = {
      isAdmin: false,
      categoryFilter: "all",
      posts: [],
      currentDate: new Date().toISOString().split('T')[0]
    };

    const refs = {
      mobileMenuButton: document.getElementById("mobileMenuButton"),
      mobileMenuPanel: document.getElementById("mobileMenuPanel"),
      mobileMenuOverlay: document.getElementById("mobileMenuOverlay"),
      adminLoginButton: document.getElementById("adminLoginButton"),
      adminLogoutButton: document.getElementById("adminLogoutButton"),
      viewContainer: document.getElementById("viewContainer"),
      rangeLabel: document.getElementById("rangeLabel"),
      selectedDayPanel: document.getElementById("selectedDayPanel"),
      upcomingPanel: document.getElementById("upcomingPanel"),
      toast: document.getElementById("toast")
    };

    let toastTimer = null;

    const firebaseApp = initializeApp(firebaseConfig);
    const auth = getAuth(firebaseApp);
    const db = getFirestore(firebaseApp);

    function showToast(message) {
      refs.toast.textContent = message;
      refs.toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        refs.toast.classList.remove("show");
      }, 2400);
    }

    function openModal(modalId) {
      document.getElementById(modalId).classList.remove("hidden");
      document.body.style.overflow = "hidden";
    }

    function closeModal(modalId) {
      document.getElementById(modalId).classList.add("hidden");
      if (document.querySelectorAll(".modal:not(.hidden)").length === 0) {
        document.body.style.overflow = "";
      }
    }

    function render() {
      refs.rangeLabel.textContent = new Date(state.currentDate).toLocaleDateString("ja-JP", {
        year: "numeric",
        month: "long",
        day: "numeric",
        weekday: "short"
      });

      const posts = state.posts.filter(p => state.categoryFilter === "all" || p.category === state.categoryFilter);

      if (posts.length === 0) {
        refs.viewContainer.innerHTML = `<div class="empty-state">投稿がありません。</div>`;
        refs.selectedDayPanel.innerHTML = `<div class="empty-state">この日の投稿はありません。</div>`;
        refs.upcomingPanel.innerHTML = `<div class="empty-state">今後の投稿はありません。</div>`;
        return;
      }

      refs.viewContainer.innerHTML = posts.map(post => `
        <div class="post-card">
          <div class="post-badges">
            <span class="badge" style="background: rgba(0, 113, 227, 0.1); color: #0071e3;">${post.category}</span>
          </div>
          <h3 class="post-title">${post.title}</h3>
          <p class="post-body">${post.body}</p>
        </div>
      `).join("");

      const todayPosts = posts.filter(p => p.date === state.currentDate);
      refs.selectedDayPanel.innerHTML = todayPosts.length > 0 
        ? todayPosts.map(p => `<div style="padding: 12px; background: rgba(248, 250, 252, 0.9); border-radius: 12px;"><strong>${p.title}</strong></div>`).join("")
        : `<div class="empty-state">この日の投稿はありません。</div>`;
    }

    function loadPosts() {
      const postsRef = collection(db, "posts");
      onSnapshot(postsRef, (snapshot) => {
        state.posts = snapshot.docs.map(doc => ({
          id: doc.id,
          ...doc.data()
        }));
        render();
      }, (error) => {
        console.error("投稿の読み込みに失敗しました", error);
        showToast("データを読み込めません");
      });
    }

    // ハンバーガーメニュー
    refs.mobileMenuButton.addEventListener("click", () => {
      refs.mobileMenuPanel.classList.toggle("active");
      refs.mobileMenuOverlay.classList.toggle("active");
    });

    refs.mobileMenuOverlay.addEventListener("click", () => {
      refs.mobileMenuPanel.classList.remove("active");
      refs.mobileMenuOverlay.classList.remove("active");
    });

    document.querySelectorAll(".mobile-menu-item").forEach(item => {
      item.addEventListener("click", () => {
        state.categoryFilter = item.dataset.filter;
        document.querySelectorAll("[data-category-filter]").forEach(btn => {
          btn.classList.toggle("active", btn.dataset.categoryFilter === state.categoryFilter);
        });
        render();
        refs.mobileMenuPanel.classList.remove("active");
        refs.mobileMenuOverlay.classList.remove("active");
      });
    });

    // PC版フィルター
    document.querySelectorAll("[data-category-filter]").forEach(btn => {
      btn.addEventListener("click", () => {
        state.categoryFilter = btn.dataset.categoryFilter;
        document.querySelectorAll("[data-category-filter]").forEach(b => {
          b.classList.toggle("active", b.dataset.categoryFilter === state.categoryFilter);
        });
        render();
      });
    });

    // 管理者ログイン
    refs.adminLoginButton.addEventListener("click", () => {
      openModal("adminModal");
    });

    refs.adminLogoutButton.addEventListener("click", async () => {
      try {
        await signOut(auth);
        state.isAdmin = false;
        showToast("ログアウトしました");
      } catch (error) {
        showToast("ログアウトに失敗しました");
      }
    });

    document.getElementById("adminForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("adminEmail").value;
      const password = document.getElementById("adminPassword").value;

      try {
        await signInWithEmailAndPassword(auth, email, password);
        closeModal("adminModal");
        showToast("ログインしました");
      } catch (error) {
        showToast("ログインに失敗しました");
      }
    });

    document.addEventListener("click", (e) => {
      if (e.target.closest("[data-close-modal]")) {
        closeModal(e.target.closest("[data-close-modal]").dataset.closeModal);
      }
      if (e.target.classList.contains("modal")) {
        closeModal(e.target.id);
      }
    });

    onAuthStateChanged(auth, (user) => {
      state.isAdmin = !!user;
      refs.adminLoginButton.hidden = state.isAdmin;
      refs.adminLogoutButton.hidden = !state.isAdmin;
    });

    loadPosts();
  </script>
</body>
</html>
